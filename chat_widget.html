<html lang="en">
<title>Keywordit · Research Assistant</title>
<!-- Research Chat Widget -->
<div id="chat-widget" class="chat-widget" style="display: none;">
  <button id="chat-toggle" class="chat-toggle" title="Research Assistant" aria-label="Open research assistant chat" aria-expanded="false" aria-controls="chat-panel">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>
  
  <div id="chat-panel" class="chat-panel hidden">
    <div class="chat-header">
      <div>
        <h3>Research Assistant</h3>
        <p class="chat-subtitle">Ask about entities, verticals, templates</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button id="chat-clear" class="chat-close-btn" title="Clear history" style="font-size:14px;" aria-label="Reset conversation">&#8634;</button>
        <button id="chat-close" class="chat-close-btn" aria-label="Close chat">×</button>
      </div>
    </div>
    
    <div id="chat-messages" class="chat-messages">
      <!-- Messages appear here -->
    </div>
    
    <div id="chat-input-container" class="chat-input-container">
      <input type="text" id="chat-input" placeholder="Ask about entities, verticals, templates..." autocomplete="off" aria-label="Ask about entities, verticals, templates">
      <button id="chat-send" class="chat-send-btn" aria-label="Send message">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<style>
/* Chat Widget Styles */
.chat-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  font-family: var(--font-sans, system-ui, sans-serif);
}

.chat-toggle {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--accent, #14b8a6);
  border: none;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(45,212,191,0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.chat-toggle:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 16px rgba(45,212,191,0.4);
}

.chat-toggle:active {
  transform: scale(0.95);
}

.chat-panel {
  position: absolute;
  bottom: 80px;
  right: 0;
  width: 400px;
  height: 600px;
  background: var(--bg-surface, #1e1e2e);
  border: 1px solid var(--border, #313244);
  border-radius: var(--radius-xl, 16px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  transition: opacity 0.2s ease, transform 0.2s ease;
  opacity: 1;
  transform: translateY(0);
}

.chat-panel.hidden {
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}

.chat-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg-raised, #262637);
  border-radius: var(--radius-xl, 16px) var(--radius-xl, 16px) 0 0;
}

.chat-header h3 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary, #e8e8f0);
}

.chat-subtitle {
  margin: 4px 0 0 0;
  font-size: 12px;
  color: var(--text-secondary, #6a6a7a);
}

.chat-close-btn {
  background: none;
  border: none;
  font-size: 28px;
  line-height: 1;
  color: var(--text-secondary, #6a6a7a);
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm, 6px);
  transition: background 0.15s ease, color 0.15s ease;
}

.chat-close-btn:hover {
  background: var(--bg-hover, rgba(255,255,255,0.05));
  color: var(--text-primary, #e8e8f0);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.chat-messages::-webkit-scrollbar {
  width: 6px;
}

.chat-messages::-webkit-scrollbar-track {
  background: transparent;
}

.chat-messages::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 3px;
}

.chat-messages::-webkit-scrollbar-thumb:hover {
  background: var(--border-light);
}

.chat-message {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
}

.chat-message.user {
  align-self: flex-end;
  background: var(--accent-dim, rgba(45,212,191,0.15));
  color: var(--text-primary, #e8e8f0);
  border: 1px solid var(--accent, #14b8a6);
}

.chat-message.ai {
  align-self: flex-start;
  background: var(--bg-elevated, #2a2a3c);
  color: var(--text-primary, #e8e8f0);
  border: 1px solid var(--border, #313244);
}

.chat-message.typing {
  background: var(--bg-elevated, #2a2a3c);
  color: var(--text-secondary, #6a6a7a);
  font-style: italic;
  border: 1px solid var(--border, #313244);
}

.chat-input-container {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--bg-raised, #262637);
  border-radius: 0 0 var(--radius-xl, 16px) var(--radius-xl, 16px);
}

.chat-input-container input {
  flex: 1;
  padding: 10px 14px;
  background: var(--bg-input, #1a1a2e);
  border: 1px solid var(--border, #313244);
  border-radius: var(--radius-md, 8px);
  color: var(--text-primary, #e8e8f0);
  font-size: 14px;
  font-family: var(--font-sans, system-ui, sans-serif);
  transition: border-color 0.15s ease;
}

.chat-input-container input:focus {
  outline: none;
  border-color: var(--accent, #14b8a6);
}

.chat-input-container input::placeholder {
  color: var(--text-tertiary, #3a3a48);
}

.chat-send-btn {
  padding: 10px 16px;
  background: var(--accent, #14b8a6);
  color: white;
  border: none;
  border-radius: var(--radius-md, 8px);
  cursor: pointer;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s ease, transform 0.1s ease;
}

.chat-send-btn:hover {
  background: var(--accent-hover, #0d9488);
}

.chat-send-btn:active {
  transform: scale(0.95);
}

.chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Mobile responsive */
.chat-message.ai { max-height: 400px; overflow-y: auto; }

.typing-dots span {
  animation: typingDot 1.4s infinite;
  opacity: 0;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingDot { 0%,60%,100% { opacity: 0; } 30% { opacity: 1; } }

@media (max-width: 480px) {
  .chat-panel {
    width: calc(100vw - 32px);
    height: calc(100vh - 120px);
    right: 16px;
    bottom: 80px;
  }
}
</style>

<script>
// Chat Widget Controller
const ChatWidget = {
  apiUrl: 'https://keywordit-api-production.up.railway.app/api',
  isLoggedIn: false,
  
  _storageKey: 'keywordit_chat_history',
  _maxMessages: 50,

  init() {
    this.isLoggedIn = this.checkLoginStatus();

    if (this.isLoggedIn) {
      document.getElementById('chat-widget').style.display = 'block';
      this.bindEvents();
      this._restoreHistory();
    }
  },

  _restoreHistory() {
    try {
      const saved = JSON.parse(localStorage.getItem(this._storageKey) || '[]');
      if (saved.length > 0) {
        saved.forEach(m => this.addMessage(m.type, m.text, true));
      } else {
        this.addMessage('ai', 'Hi! I\'m your research assistant. Ask me about entities, verticals, templates, or performance data.');
      }
    } catch(e) {
      this.addMessage('ai', 'Hi! I\'m your research assistant. Ask me about entities, verticals, templates, or performance data.');
    }
  },

  _saveHistory() {
    try {
      const msgs = Array.from(document.querySelectorAll('.chat-message:not(.typing)')).map(el => ({
        type: el.classList.contains('user') ? 'user' : 'ai',
        text: el.textContent
      })).slice(-this._maxMessages);
      localStorage.setItem(this._storageKey, JSON.stringify(msgs));
    } catch(e) {}
  },

  clearHistory() {
    document.getElementById('chat-messages').innerHTML = '';
    localStorage.removeItem(this._storageKey);
    this.addMessage('ai', 'Chat cleared. How can I help?');
  },
  
  checkLoginStatus() {
    // Check localStorage session (consistent with login.html, dashboard.html, etc.)
    try {
      const sess = JSON.parse(localStorage.getItem('keywordit_session') || 'null');
      if (sess && sess.token) {
        // Check session expiry
        if (sess.expiresAt && Date.now() > sess.expiresAt) return false;
        return true;
      }
    } catch(e) {}

    // Fallback: check for global variable set by parent page
    if (typeof window.isAuthenticated !== 'undefined' && window.isAuthenticated) return true;

    return false;
  },
  
  bindEvents() {
    document.getElementById('chat-toggle').onclick = () => this.togglePanel();
    document.getElementById('chat-close').onclick = () => this.closePanel();
    document.getElementById('chat-clear').onclick = () => this.clearHistory();
    document.getElementById('chat-send').onclick = () => this.sendMessage();
    document.getElementById('chat-input').onkeypress = (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !document.getElementById('chat-send').disabled) {
        e.preventDefault();
        this.sendMessage();
      }
    };
  },
  
  togglePanel() {
    const panel = document.getElementById('chat-panel');
    const toggle = document.getElementById('chat-toggle');
    panel.classList.toggle('hidden');
    const isOpen = !panel.classList.contains('hidden');
    toggle.setAttribute('aria-expanded', String(isOpen));
    toggle.setAttribute('aria-label', isOpen ? 'Close research assistant chat' : 'Open research assistant chat');
    if (isOpen) {
      document.getElementById('chat-input').focus();
    }
  },

  closePanel() {
    const panel = document.getElementById('chat-panel');
    const toggle = document.getElementById('chat-toggle');
    panel.classList.add('hidden');
    toggle.setAttribute('aria-expanded', 'false');
    toggle.setAttribute('aria-label', 'Open research assistant chat');
  },
  
  async sendMessage() {
    const input = document.getElementById('chat-input');
    const query = input.value.trim();
    if (!query) return;
    
    this.addMessage('user', query);
    input.value = '';
    
    // Disable send button
    const sendBtn = document.getElementById('chat-send');
    sendBtn.disabled = true;
    
    this.showTyping();
    
    try {
      const resp = await fetch(`${this.apiUrl}/chat`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        credentials: 'include',
        body: JSON.stringify({query})
      });
      
      const data = await resp.json();
      this.hideTyping();
      
      if (data.response) {
        this.addMessage('ai', data.response);
      } else if (data.error) {
        this.addMessage('ai', `Error: ${data.error}`);
      } else {
        this.addMessage('ai', 'Sorry, I encountered an error. Please try again.');
      }
    } catch (error) {
      this.hideTyping();
      this.addMessage('ai', 'Sorry, the research API is not available right now. Please try again later.');
      console.error('Chat API error:', error);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  },
  
  formatAI(text) {
    // Sanitize: escape ALL HTML first, then allow only safe markdown patterns
    let s = String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
    s = s.replace(/`(.+?)`/g, '<code>$1</code>');
    s = s.replace(/\n/g, '<br>');
    // Final pass: strip any remaining raw HTML tags that got through (belt + suspenders)
    s = s.replace(/<(?!\/?(strong|em|code|br)\b)[^>]*>/gi, '');
    return s;
  },

  addMessage(type, text, skipSave) {
    const container = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = `chat-message ${type}`;
    if (type === 'ai') {
      msg.innerHTML = this.formatAI(text);
    } else {
      msg.textContent = text;
    }
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    // Trim to max messages
    const all = container.querySelectorAll('.chat-message:not(.typing)');
    if (all.length > this._maxMessages) all[0].remove();
    if (!skipSave) this._saveHistory();
  },

  showTyping() {
    this.hideTyping();
    const container = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = 'chat-message typing';
    msg.id = 'typing-indicator';
    msg.innerHTML = 'Assistant is typing<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>';
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  },
  
  hideTyping() {
    const typing = document.getElementById('typing-indicator');
    if (typing) {
      typing.remove();
    }
  }
};

// Initialize on page load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => ChatWidget.init());
} else {
  ChatWidget.init();
}
</script>
